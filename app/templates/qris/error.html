{% extends "base.html" %}
{% block title %}QRIS Error{% endblock title %}
{% block main %}
<section class="bg-gray-50 dark:bg-gray-900 min-h-screen">
  <div class="flex flex-col items-center justify-center px-6 py-12 mx-auto">
    <div class="w-full max-w-md p-6 bg-white rounded-lg shadow-sm dark:bg-gray-800 dark:border dark:border-gray-700">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">QRIS belum dapat diproses</h1>
      <p class="mt-3 text-sm text-red-600 dark:text-red-400">{{ message }}</p>
      <a class="inline-block mt-5 text-sm text-blue-600 dark:text-blue-400" href="{{ url_for('qris.plans') }}">Kembali ke paket</a>
    </div>
  </div>
</section>
{% endblock main %}
